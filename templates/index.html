<!DOCTYPE html>

<html>
<head>

<title>Book Recommender</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">

<style>

body{
background:#0f172a;
font-family:Arial;
}

.navbar{
background:#10b981;
border:none;
}

.navbar-brand{
color:white !important;
font-weight:bold;
}

.text-white{
color:white;
}

.book-card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:30px;
text-align:center;
transition:0.3s;
}

.book-card:hover{
transform:translateY(-8px);
box-shadow:0 10px 20px rgba(0,0,0,0.6);
}

.book-img{
height:250px;
object-fit:cover;
border-radius:8px;
}

.rating{
color:#22c55e;
}

</style>

</head>

<body>

<nav class="navbar">

<a class="navbar-brand">📚 Book Recommender</a>

<ul class="nav navbar-nav">
<li><a href="/">Home</a></li>
<li><a href="/recommend">Recommend</a></li>
</ul>

</nav>

<div class="container">

<h1 class="text-white" style="font-size:45px">Popular Books</h1>

<div class="row">

{% for i in range(book_name|length) %}

{% if book_name[i] and image[i] %}

<div class="col-md-4">

<div class="book-card">

<img src="{{image[i]}}" class="book-img">

<p class="text-white"><b>{{book_name[i]}}</b></p>

<p class="text-white">{{author[i]}}</p>

<p class="text-white">👍 Votes: {{votes[i]}}</p>

<p class="rating">⭐ {{rating[i]}}</p>

</div>

</div>

{% endif %}

{% endfor %}

</div>

</div>

</body>

</html>
