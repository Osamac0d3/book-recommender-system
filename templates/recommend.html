<!DOCTYPE html>

<html>

<head>

<title>Recommend Books</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">

<style>

body{
background:#0f172a;
font-family:Arial;
}

.navbar{
background:#10b981;
border:none;
}

.navbar-brand{
color:white !important;
font-weight:bold;
}

.text-white{
color:white;
}

.search-box{
margin-top:30px;
}

.book-card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:30px;
text-align:center;
transition:0.3s;
}

.book-card:hover{
transform:translateY(-8px);
box-shadow:0 10px 20px rgba(0,0,0,0.6);
}

.book-img{
height:250px;
border-radius:8px;
}

</style>

</head>

<body>

<nav class="navbar">

<a class="navbar-brand">📚 Book Recommender</a>

<ul class="nav navbar-nav">
<li><a href="/">Home</a></li>
<li><a href="/recommend">Recommend</a></li>
</ul>

</nav>

<div class="container">

<h1 class="text-white" style="font-size:45px">Find Similar Books</h1>

<div class="search-box">

<form action="/recommend_books" method="post">

<input
name="user_input"
type="text"
class="form-control"
placeholder="Enter book name">

<br>

<button class="btn btn-success btn-lg">
Get Recommendations
</button>

</form>

</div>

{% if error %}

<h3 class="text-white">{{error}}</h3>

{% endif %}

<div class="row">

{% if data %}

{% for i in data %}

{% if i[0] and i[2] %}

<div class="col-md-4">

<div class="book-card">

<img src="{{i[2]}}" class="book-img">

<p class="text-white"><b>{{i[0]}}</b></p>

<p class="text-white">{{i[1]}}</p>

</div>

</div>

{% endif %}

{% endfor %}

{% endif %}

</div>

</div>

</body>

</html>
